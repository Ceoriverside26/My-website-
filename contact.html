<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact | Riverside Luxe Retreats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
body{margin:0;background:#ece7de;font-family:'Inter',sans-serif;color:#1a2b40}
.wrap{max-width:1200px;margin:0 auto;background:#f5f1ea;min-height:100vh}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 32px;background:#fff;border-bottom:1px solid #e7e0d5}
.brand{display:flex;align-items:center;gap:100px;text-decoration:none;color:inherit}
.brand img{height:90px}
.brand h1{margin:0;font-family:'Cormorant Garamond',serif;color:#10284a;font-size:28px}
nav a{margin-left:22px;text-decoration:none;color:#1a2b40;font-weight:700;text-transform:uppercase;font-size:14px}
.hero{padding:70px 32px;background:linear-gradient(90deg,rgba(249,246,240,.95),rgba(249,246,240,.88)),url('https://images.unsplash.com/photo-1494526585095-c41746248156?auto=format&fit=crop&w=1400&q=80') center/cover}
h2{font-family:'Cormorant Garamond',serif;color:#10284a;font-size:62px;line-height:.95;margin:0 0 18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:22px;padding:32px}
.box{background:#fff;border:1px solid #ddd6cb;border-radius:18px;padding:24px}
.box h3{font-family:'Cormorant Garamond',serif;color:#10284a;font-size:30px;margin:0 0 12px}
.line{margin:10px 0;color:#334458;font-size:16px;line-height:1.7}
input,textarea{width:100%;padding:14px;border:1px solid #cfd6df;border-radius:10px;margin-bottom:12px;font:inherit}
button{background:#10284a;color:#fff;border:none;border-radius:10px;padding:14px 20px;font-weight:700}
@media (max-width:900px){.grid{grid-template-columns:1fr}header{display:block}.brand{margin-bottom:16px}}
</style>
</head>
<body>
<div class="wrap">
<header>
  <a href="index.html" class="brand">
    <img src="https://raw.githubusercontent.com/Ceoriverside26/My-website-/main/riverside_luxe_logo.png" alt="Logo">
    <h1>Riverside Luxe Retreats</h1>
  </a>
  <nav>
    <a href="index.html">Home</a>
    <a href="properties.html">Properties</a>
    <a href="partner.html">Partner</a>
    <a href="about.html">About</a>
    <a href="reviews.html">Reviews</a>
  </nav>
</header>

<section class="hero">
  <h2>We’re Here to Help</h2>
</section>

<section class="grid">
  <div class="box">
    <h3>Contact Information</h3>
    <div class="line">☎ (904) 123-4567</div>
    <div class="line">✉ operations@riversideluxeretreats.com</div>
    <div class="line">⌖ 50 North Laura St Suite 2500<br>Jacksonville, FL 32202</div>
  </div>

  <div class="box">
    <h3>Send a Message</h3>
    <input type="text" placeholder="Your Name">
    <input type="email" placeholder="Your Email">
    <textarea rows="5" placeholder="Your Message"></textarea>
    <button>Send Message</button>
  </div>
</section>
</div>
</body>
</html>
