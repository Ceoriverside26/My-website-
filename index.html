<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Riverside Luxe Retreats</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #0b1a2a;
      color: white;
    }

    header {
      position: fixed;
      width: 100%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      background: rgba(0,0,0,0.4);
      z-index: 100;
    }

    header img {
      height: 55px;
    }

    nav a {
      margin-left: 25px;
      text-decoration: none;
      color: white;
      font-weight: 500;
    }

    .hero {
      height: 100vh;
      background: url('https://images.unsplash.com/photo-1493809842364-78817add7ffb') center/cover no-repeat;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .hero h1 {
      font-size: 42px;
      line-height: 1.3;
      font-family: 'Playfair Display', serif;
    }

    .highlight {
      color: #4da3ff;
    }

    .hero button {
      margin-top: 25px;
      padding: 14px 30px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #4da3ff;
      color: white;
    }

    section {
      padding: 80px 20px;
      text-align: center;
    }

    .light {
      background: #f5f5f5;
      color: #111;
    }

    .dark {
      background: #0b1a2a;
    }

    .logo {
      max-width: 260px;
      margin-bottom: 20px;
    }

    h2 {
      margin-bottom: 10px;
      font-size: 28px;
    }

    p {
      max-width: 500px;
      margin: auto;
      opacity: 0.8;
    }
  </style>
</head>

<body>

<header>
  <img src="https://i.imgur.com/YOURLOGO.png" alt="Riverside Luxe Retreats">
  <nav>
    <a href="#">Home</a>
    <a href="#">Properties</a>
    <a href="#">Contact</a>
  </nav>
</header>

<div class="hero">
  <div>
    <h1>
      Luxury Stays.<br>
      Prime Locations.<br>
      <span class="highlight">Exceptional Returns.</span>
    </h1>
    <button>Book a Stay</button>
  </div>
</div>

<section class="light">
  <img src="https://i.imgur.com/<header style="display:flex; align-items:center; padding:20px 40px; background:#0b1a2a;">
  <img src="logo.png" alt="Riverside Luxe Retreats Logo" style="height: 60px; width: auto;">
</header> class="logo">
  <h2>Premium Rental Experiences</h2>
  <p>We turn properties into fully managed luxury stays for guests and investors.</p>
</section>

<section class="dark">
  <h2>Let’s Work Together</h2>
  <p>Contact us to get started with Riverside Luxe Retreats.</p>
</section>

</body>
</html>
